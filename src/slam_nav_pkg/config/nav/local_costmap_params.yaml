local_costmap:
  global_frame: odom
  robot_base_frame: base_footprint
  update_frequency: 8.0    # 提高更新频率，加快障碍物清除
  publish_frequency: 3.0
  static_map: false
  rolling_window: true
  width: 4.0               # Gazebo室内场景4m够用
  height: 4.0
  resolution: 0.05         # 5cm分辨率，跟建图分辨率保持一致

  # 严格处理致命障碍物
  lethal_cost_threshold: 100

  plugins:
  - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}