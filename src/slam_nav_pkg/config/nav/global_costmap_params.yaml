# global_costmap_params.yaml

global_costmap:
  global_frame: map
  robot_base_frame: base_footprint
  update_frequency: 0.5      # 静态地图不需要频繁更新，省CPU（原1.0）
  publish_frequency: 0.3
  static_map: true
  transform_tolerance: 0.5
  lethal_cost_threshold: 100

  # global costmap 覆盖 common 里的 observation_persistence
  # static_map=true 时障碍物来自地图，不需要自动过期
  obstacle_layer:
    observation_sources: base_lidar
    base_lidar:
      observation_persistence: 0.0   # 覆盖 common 的 0.5，全局层永久保留

  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}